name: Actualizar métricas del proyecto

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write
  issues: read

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descargar issues desde GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh issue list --state all --limit 100 --json number,title,body,labels,state,createdAt,closedAt,updatedAt,url > data/issues.json

      - name: Calcular métricas
        run: python scripts/build_metrics.py

      - name: Guardar métricas generadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/issues.json docs/metrics.json
          git commit -m "chore: actualizar métricas automáticas" || echo "No hay cambios para confirmar"
          git push
